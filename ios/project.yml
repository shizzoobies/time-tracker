name: TimeTracker
options:
  bundleIdPrefix: com.pbj
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
targets:
  TimeTracker:
    type: application
    platform: iOS
    sources:
      - path: TimeTracker
        excludes:
          - "App/Config.swift.example"
          - "App/Config.example.swift.txt"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pbj.timetracker
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: TimeTracker/Info.plist
        DEVELOPMENT_TEAM: 7P986JMA56
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: TimeTracker/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
